# Sasquatch Redis configuration
# Persistence: RDB snapshots + AOF (appendfsync everysec)

port 6379

# ── RDB snapshots ────────────────────────────────────────────────────────────
# Save if at least 1 key changed in the last 15 min, 10 keys in 5 min,
# or 10,000 keys in 1 min.
save 900 1
save 300 10
save 60 10000

dbfilename dump.rdb

# ── AOF (Append-Only File) ────────────────────────────────────────────────────
# Syncs to disk every second — at most 1 second of data lost on hard crash.
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# ── Data directory ────────────────────────────────────────────────────────────
# Overridden by the `--dir` CLI flag in docker-compose.yml (set to /data).

# ── Logging ───────────────────────────────────────────────────────────────────
loglevel notice
