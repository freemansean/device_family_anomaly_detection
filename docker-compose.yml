services:
  redis:
    image: redis:7-alpine
    volumes:
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis-data:/data
    command: redis-server /usr/local/etc/redis/redis.conf --dir /data --bind 0.0.0.0
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - SASQUATCH_CORS_ORIGINS=*
      - SASQUATCH_SQLITE_PATH=/unsupervised_anomaly/sqlite/sasquatch.db
      # Cap glibc malloc arenas. Default is 8 × CPU count (~64 on this host),
      # which fragments badly with numpy/sklearn allocation patterns and left
      # ~15 GB of unreclaimed arenas resident after a detection run. 2 arenas
      # keeps peak RSS well under the limit at a negligible throughput cost
      # for this largely single-threaded pipeline.
      - MALLOC_ARENA_MAX=2
    volumes:
      - sqlite-data:/unsupervised_anomaly/sqlite
      - logs:/unsupervised_anomaly/logs
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  redis-data:
  sqlite-data:
  logs:
