version: 1
disable_existing_loggers: false

formatters:
  default:
    format: "%(asctime)s %(levelname)s %(name)s — %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

handlers:
  file:
    class: logging.handlers.RotatingFileHandler
    formatter: default
    filename: logs/backend.log
    maxBytes: 10485760   # 10 MB per file
    backupCount: 5
    encoding: utf-8
  console:
    class: logging.StreamHandler
    formatter: default
    stream: ext://sys.stdout

root:
  level: INFO
  handlers: [file, console]

loggers:
  uvicorn:
    level: INFO
    handlers: [file, console]
    propagate: false
  uvicorn.error:
    level: INFO
    handlers: [file, console]
    propagate: false
  uvicorn.access:
    level: INFO
    handlers: [file, console]
    propagate: false
